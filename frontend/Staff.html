<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Staff Dashboard - MSRIT AI</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary-container": "#a8406a",
                    "surface-container": "#eeeeee",
                    "primary": "#892852",
                    "on-primary": "#ffffff",
                    "background": "#f9f9f9",
                    "surface-container-highest": "#e2e2e2",
                    "on-surface": "#1a1c1c",
                    "on-secondary-container": "#5f2600",
                    "on-surface-variant": "#544247",
                    "on-tertiary-container": "#d9e3ff",
                    "inverse-surface": "#2f3131",
                    "tertiary-fixed": "#d8e2ff",
                    "outline-variant": "#dac0c6",
                    "on-tertiary-fixed-variant": "#28457d",
                    "on-tertiary-fixed": "#001a42",
                    "outline": "#877177",
                    "surface-tint": "#9f3963",
                    "secondary": "#9d4400",
                    "surface-container-lowest": "#ffffff",
                    "on-error": "#ffffff",
                    "on-secondary-fixed-variant": "#783200",
                    "primary-fixed": "#ffd9e3",
                    "tertiary-fixed-dim": "#aec6ff",
                    "secondary-fixed": "#ffdbca",
                    "on-error-container": "#93000a",
                    "tertiary-container": "#48649e",
                    "surface-container-low": "#f3f3f3",
                    "tertiary": "#2f4c84",
                    "primary-fixed-dim": "#ffb0c9",
                    "on-background": "#1a1c1c",
                    "surface": "#f9f9f9",
                    "surface-variant": "#e2e2e2",
                    "error-container": "#ffdad6",
                    "inverse-primary": "#ffb0c9",
                    "on-secondary-fixed": "#331100",
                    "secondary-container": "#fc7c2a",
                    "surface-dim": "#dadada",
                    "surface-bright": "#f9f9f9",
                    "on-secondary": "#ffffff",
                    "on-primary-container": "#ffdae4",
                    "error": "#ba1a1a",
                    "on-primary-fixed-variant": "#81214b",
                    "on-primary-fixed": "#3e001e",
                    "on-tertiary": "#ffffff",
                    "surface-container-high": "#e8e8e8",
                    "inverse-on-surface": "#f1f1f1",
                    "secondary-fixed-dim": "#ffb690"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, .font-headline { font-family: 'Plus Jakarta Sans', sans-serif; }
        .chat-scroll::-webkit-scrollbar { width: 4px; }
        .chat-scroll::-webkit-scrollbar-track { background: transparent; }
        .chat-scroll::-webkit-scrollbar-thumb { background: #e2e2e2; border-radius: 10px; }
    </style>
</head>
<body class="bg-surface font-body text-on-surface">
<!-- TopNavBar -->
<nav class="fixed top-0 w-full z-40 shadow-sm dark:shadow-none font-headline text-sm tracking-tight flex justify-between items-center px-6 py-3 w-full backdrop-blur-md bg-white/80 dark:bg-gray-900/80">
<div class="flex items-center gap-4">
<span class="text-xl font-bold tracking-tighter text-[#892852] dark:text-[#a8406a]">MSRIT AI</span>
</div>
<div class="hidden md:flex items-center gap-8">
<a class="text-[#892852] font-bold border-b-2 border-[#892852] cursor-pointer active:opacity-70" href="#">Staff Dashboard</a>
</div>
<div class="flex items-center gap-4 relative">
<div class="relative">
<button id="profileToggle" class="material-symbols-outlined text-[#892852] cursor-pointer">settings</button>
<div id="profileMenu" class="hidden absolute right-0 mt-2 w-44 rounded-3xl bg-white border border-outline-variant/10 shadow-lg text-left overflow-hidden z-50">
<button id="logoutBtn" class="w-full px-4 py-3 text-left text-primary font-semibold hover:bg-surface-container-low transition-all">Logout</button>
</div>
</div>
</div>
<div class="absolute bottom-0 left-0 w-full bg-gradient-to-r from-transparent via-[#dac0c6]/20 to-transparent h-[1px]"></div>
</nav>
<!-- Main Content Area -->
<main class="pt-20 p-8 min-h-screen bg-surface">
<div class="max-w-7xl mx-auto">
<!-- Chatbot Section -->
<section class="h-[calc(100vh-180px)] flex flex-col">
<div class="bg-surface-container-low flex-1 rounded-3xl overflow-hidden flex flex-col shadow-inner relative">
<!-- Chat Header -->
<div class="px-6 py-4 bg-white/50 backdrop-blur-md flex items-center justify-between border-b border-outline-variant/10">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-white">
<span class="material-symbols-outlined">smart_toy</span>
</div>
<div>
<div class="text-sm font-bold">Syllabus Analysis AI</div>
<div class="text-[10px] text-green-600 font-bold uppercase tracking-widest flex items-center gap-1">
<span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span>
Online
</div>
</div>
</div>
</div>
<!-- Chat Messages -->
<div class="flex-1 overflow-y-auto p-6 space-y-6 chat-scroll" id="chatMessages">
<div class="flex gap-3 max-w-[85%]">
<div class="w-8 h-8 rounded-full bg-primary flex items-center justify-center flex-shrink-0">
<span class="material-symbols-outlined text-white text-sm">smart_toy</span>
</div>
<div class="bg-surface-container-lowest p-4 rounded-2xl rounded-tl-none shadow-sm text-sm text-on-surface">
<p>Hello! I've analyzed the syllabus. I can help you identify skill gaps, suggest improvements, or answer questions about curriculum. How can I help you today?</p>
</div>
</div>
</div>
<!-- Input Area -->
<div class="p-4 bg-white/80 backdrop-blur-md border-t border-outline-variant/10">
<div class="flex items-center gap-3 bg-surface-container-low rounded-2xl px-4 py-2 border border-transparent focus-within:border-primary/30 transition-all">
<input class="flex-1 bg-transparent border-none focus:ring-0 text-sm py-2" id="staffChatInput" placeholder="Ask about the syllabus..." type="text"/>
<button class="w-10 h-10 bg-primary text-white rounded-xl flex items-center justify-center hover:bg-primary-container transition-colors" id="staffSendBtn">
<span class="material-symbols-outlined">send</span>
</button>
</div>
</div>
</div>
</section>
</div>
</main>
<script>
const profileToggle = document.getElementById('profileToggle');
const profileMenu = document.getElementById('profileMenu');
const logoutBtn = document.getElementById('logoutBtn');
const chatMessages = document.getElementById('chatMessages');
const staffChatInput = document.getElementById('staffChatInput');
const staffSendBtn = document.getElementById('staffSendBtn');

async function verifyStaffAccess() {
  try {
    const response = await fetch('/api/auth/authorize?page=staff', {
      method: 'GET',
      credentials: 'include'
    });

    if (response.ok) {
      return;
    }

    if (response.status === 401) {
      window.location.href = '/StaffLogin.html';
      return;
    }

    if (response.status === 403) {
      window.location.href = '/Student.html';
      return;
    }

    window.location.href = '/Home.html';
  } catch (error) {
    window.location.href = '/StaffLogin.html';
  }
}

profileToggle.addEventListener('click', function(event) {
    event.stopPropagation();
    profileMenu.classList.toggle('hidden');
});

function appendUserMessage(message) {
  const wrapper = document.createElement('div');
  wrapper.className = 'flex justify-end';
  const bubble = document.createElement('div');
  bubble.className = 'max-w-[85%] bg-primary text-white p-4 rounded-2xl rounded-tr-none shadow-sm text-sm leading-relaxed whitespace-pre-wrap';
  bubble.textContent = message;
  wrapper.appendChild(bubble);
  chatMessages.appendChild(wrapper);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function appendBotMessage(message) {
  const wrapper = document.createElement('div');
  wrapper.className = 'flex gap-3 max-w-[85%]';
  const iconWrap = document.createElement('div');
  iconWrap.className = 'w-8 h-8 rounded-full bg-primary flex items-center justify-center flex-shrink-0';
  const icon = document.createElement('span');
  icon.className = 'material-symbols-outlined text-white text-sm';
  icon.textContent = 'smart_toy';
  iconWrap.appendChild(icon);

  const bubble = document.createElement('div');
  bubble.className = 'bg-surface-container-lowest p-4 rounded-2xl rounded-tl-none shadow-sm text-sm text-on-surface whitespace-pre-wrap leading-relaxed';
  bubble.textContent = message;

  wrapper.appendChild(iconWrap);
  wrapper.appendChild(bubble);
  chatMessages.appendChild(wrapper);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function appendPendingMessage() {
  const wrapper = document.createElement('div');
  wrapper.className = 'flex gap-3 max-w-[85%]';

  const iconWrap = document.createElement('div');
  iconWrap.className = 'w-8 h-8 rounded-full bg-primary flex items-center justify-center flex-shrink-0';
  const icon = document.createElement('span');
  icon.className = 'material-symbols-outlined text-white text-sm';
  icon.textContent = 'smart_toy';
  iconWrap.appendChild(icon);

  const bubble = document.createElement('div');
  bubble.className = 'bg-surface-container-lowest p-4 rounded-2xl rounded-tl-none shadow-sm text-sm text-on-surface whitespace-pre-wrap leading-relaxed animate-pulse';
  bubble.textContent = 'Responding...';

  wrapper.appendChild(iconWrap);
  wrapper.appendChild(bubble);
  chatMessages.appendChild(wrapper);
  chatMessages.scrollTop = chatMessages.scrollHeight;
  return { wrapper, bubble };
}

function formatResponseDuration(seconds) {
  if (seconds < 1) {
    return `${Math.max(1, Math.round(seconds * 1000))} ms`;
  }
  return `${seconds.toFixed(2)} secs`;
}

function appendResponseTime(wrapper, seconds) {
  const timeLabel = document.createElement('div');
  timeLabel.className = 'mt-1 ml-11 text-[10px] text-on-surface-variant/80';
  timeLabel.textContent = `responded in ${formatResponseDuration(seconds)}`;
  wrapper.appendChild(timeLabel);
}

function clearInitialGreeting() {
  if (chatMessages.children.length > 0) {
    chatMessages.innerHTML = '';
  }
}

async function loadStaffHistory() {
  try {
    const response = await fetch('/api/chat/history', {
      method: 'GET',
      credentials: 'include'
    });

    if (!response.ok) {
      return;
    }

    const data = await response.json().catch(() => ({}));
    const messages = Array.isArray(data.messages) ? data.messages : [];
    if (!messages.length) {
      return;
    }

    clearInitialGreeting();
    messages.forEach(function(item) {
      if (item.sender === 'user') {
        appendUserMessage(item.text || '');
      } else {
        appendBotMessage(item.text || '');
      }
    });
  } catch (error) {
    console.error('Unable to load staff chat history:', error);
  }
}

async function sendStaffMessage() {
  const query = staffChatInput.value.trim();
  if (!query) {
    return;
  }

  appendUserMessage(query);
  staffChatInput.value = '';
  staffSendBtn.disabled = true;
  const requestStartTime = performance.now();
  const pendingMessage = appendPendingMessage();
  const pendingBubble = pendingMessage.bubble;

  try {
    const response = await fetch('/api/chat/query', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ query })
    });

    if (response.status === 401) {
      window.location.href = '/StaffLogin.html';
      return;
    }

    const data = await response.json().catch(() => ({}));
    if (!response.ok) {
      pendingBubble.textContent = data.detail || 'Unable to process your request right now.';
      pendingBubble.classList.remove('animate-pulse');
      return;
    }

    pendingBubble.textContent = data.response || 'No response generated.';
    pendingBubble.classList.remove('animate-pulse');
    appendResponseTime(pendingMessage.wrapper, (performance.now() - requestStartTime) / 1000);
  } catch (error) {
    pendingBubble.textContent = 'Server error. Please try again.';
    pendingBubble.classList.remove('animate-pulse');
    appendResponseTime(pendingMessage.wrapper, (performance.now() - requestStartTime) / 1000);
  } finally {
    staffSendBtn.disabled = false;
    staffChatInput.focus();
  }
}

staffSendBtn.addEventListener('click', sendStaffMessage);
staffChatInput.addEventListener('keydown', function(event) {
  if (event.key === 'Enter') {
    event.preventDefault();
    sendStaffMessage();
  }
});

logoutBtn.addEventListener('click', async function() {
  try {
    await fetch('/api/auth/logout', {
      method: 'POST',
      credentials: 'include'
    });
  } catch (error) {
    console.error('Logout failed:', error);
  }
  window.location.href = '/StaffLogin.html';
});

document.addEventListener('click', function(event) {
    if (!profileToggle.contains(event.target) && !profileMenu.contains(event.target)) {
        profileMenu.classList.add('hidden');
    }
});

  verifyStaffAccess();
  loadStaffHistory();
</script>
</body></html>
