<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Student Dashboard | MSRIT AI</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary-container": "#a8406a",
                    "surface-container": "#eeeeee",
                    "primary": "#892852",
                    "on-primary": "#ffffff",
                    "background": "#f9f9f9",
                    "surface-container-highest": "#e2e2e2",
                    "on-surface": "#1a1c1c",
                    "on-secondary-container": "#5f2600",
                    "on-surface-variant": "#544247",
                    "on-tertiary-container": "#d9e3ff",
                    "inverse-surface": "#2f3131",
                    "tertiary-fixed": "#d8e2ff",
                    "outline-variant": "#dac0c6",
                    "on-tertiary-fixed-variant": "#28457d",
                    "on-tertiary-fixed": "#001a42",
                    "outline": "#877177",
                    "surface-tint": "#9f3963",
                    "secondary": "#9d4400",
                    "surface-container-lowest": "#ffffff",
                    "on-error": "#ffffff",
                    "on-secondary-fixed-variant": "#783200",
                    "primary-fixed": "#ffd9e3",
                    "tertiary-fixed-dim": "#aec6ff",
                    "secondary-fixed": "#ffdbca",
                    "on-error-container": "#93000a",
                    "tertiary-container": "#48649e",
                    "surface-container-low": "#f3f3f3",
                    "tertiary": "#2f4c84",
                    "primary-fixed-dim": "#ffb0c9",
                    "on-background": "#1a1c1c",
                    "surface": "#f9f9f9",
                    "surface-variant": "#e2e2e2",
                    "error-container": "#ffdad6",
                    "inverse-primary": "#ffb0c9",
                    "on-secondary-fixed": "#331100",
                    "secondary-container": "#fc7c2a",
                    "surface-dim": "#dadada",
                    "surface-bright": "#f9f9f9",
                    "on-secondary": "#ffffff",
                    "on-primary-container": "#ffdae4",
                    "error": "#ba1a1a",
                    "on-primary-fixed-variant": "#81214b",
                    "on-primary-fixed": "#3e001e",
                    "on-tertiary": "#ffffff",
                    "surface-container-high": "#e8e8e8",
                    "inverse-on-surface": "#f1f1f1",
                    "secondary-fixed-dim": "#ffb690"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, .font-headline { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-surface font-body text-on-surface">
<!-- TopNavBar -->
<nav class="fixed top-0 w-full z-40 shadow-sm dark:shadow-none font-headline text-sm tracking-tight flex justify-between items-center px-6 py-3 w-full backdrop-blur-md bg-white/80 dark:bg-gray-900/80">
<div class="flex items-center gap-4">
<span class="text-xl font-bold tracking-tighter text-[#892852] dark:text-[#a8406a]">MSRIT AI</span>
</div>
<div class="hidden md:flex items-center gap-8">
<a class="text-[#892852] font-bold border-b-2 border-[#892852] cursor-pointer active:opacity-70" href="#">Student Dashboard</a>
</div>
<div class="flex items-center gap-4 relative">
<div class="relative">
<button id="profileToggle" class="material-symbols-outlined text-[#892852] cursor-pointer">settings</button>
<div id="profileMenu" class="hidden absolute right-0 mt-2 w-44 rounded-3xl bg-white border border-outline-variant/10 shadow-lg text-left overflow-hidden z-50">
<button id="logoutBtn" class="w-full px-4 py-3 text-left text-primary font-semibold hover:bg-surface-container-low transition-all">Logout</button>
</div>
</div>
</div>
<div class="absolute bottom-0 left-0 w-full bg-gradient-to-r from-transparent via-[#dac0c6]/20 to-transparent h-[1px]"></div>
</nav>
<!-- Main Content Area -->
<main class="pt-20 p-8 min-h-screen bg-surface">
<div class="max-w-7xl mx-auto">
<!-- Chatbot Section -->
<section class="h-[calc(100vh-180px)] flex flex-col">
<div class="bg-surface-container-low flex-1 rounded-3xl overflow-hidden flex flex-col shadow-inner relative">
<!-- Chat Header -->
<div class="px-6 py-4 bg-white/50 backdrop-blur-md flex items-center justify-between border-b border-outline-variant/10">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-white">
<span class="material-symbols-outlined">auto_awesome</span>
</div>
<div>
<div class="text-sm font-bold">Academic Curator AI</div>
<div class="text-[10px] text-green-600 font-bold uppercase tracking-widest flex items-center gap-1">
<span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span>
Online
</div>
</div>
</div>
</div>
<!-- Chat Messages -->
<div class="flex-1 overflow-y-auto p-6 space-y-6 chat-scroll">
<div class="flex justify-start">
<div class="max-w-[85%] bg-white p-6 rounded-2xl rounded-tl-none shadow-sm border border-outline-variant/10">
<div class="flex items-center gap-2 mb-4">
<span class="bg-secondary-fixed text-on-secondary-fixed text-[10px] px-2 py-0.5 rounded font-bold uppercase tracking-widest">Academic Insight</span>
</div>
<div class="prose prose-sm text-on-surface-variant space-y-4">
<p class="font-medium text-on-surface leading-relaxed">Hello! I'm your Academic Curator AI. Tell me about your current semester, skills, and career goals, and I'll provide personalized guidance.</p>
</div>
</div>
</div>
</div>
<!-- Chat Input -->
<div class="p-4 bg-white/80 backdrop-blur-md border-t border-outline-variant/10">
<div class="flex items-center gap-3 bg-surface-container-low rounded-2xl px-4 py-2 border border-transparent focus-within:border-primary/30 transition-all">
<input class="flex-1 bg-transparent border-none focus:ring-0 text-sm py-2" placeholder="Ask a question..." type="text"/>
<button class="w-10 h-10 bg-primary text-white rounded-xl flex items-center justify-center hover:bg-primary-container transition-colors">
<span class="material-symbols-outlined">send</span>
</button>
</div>
</div>
</div>
</section>
</div>
</main>
<script>
const profileToggle = document.getElementById('profileToggle');
const profileMenu = document.getElementById('profileMenu');
const logoutBtn = document.getElementById('logoutBtn');

profileToggle.addEventListener('click', function(event) {
    profileMenu.classList.toggle('hidden');
});

logoutBtn.addEventListener('click', function() {
    window.location.href = 'Login.html';
});

document.addEventListener('click', function(event) {
    if (!profileToggle.contains(event.target) && !profileMenu.contains(event.target)) {
        profileMenu.classList.add('hidden');
    }
});
</script>
</body></html>
