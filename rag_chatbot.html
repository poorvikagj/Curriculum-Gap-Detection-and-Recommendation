
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --acc: #1D9E75; --acc-l: #E1F5EE; --acc-d: #0F6E56;
    --warn: #BA7517; --warn-l: #FAEEDA;
    --danger: #D85A30; --danger-l: #FAECE7;
    --info: #378ADD; --info-l: #E6F1FB;
    --pur: #7F77DD; --pur-l: #EEEDFE;
  }
  .chatbot-area { border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; }
  .chat-header { background: var(--acc-l); padding: 10px 14px; display: flex; align-items: center; gap: 8px; border-bottom: 0.5px solid var(--color-border-tertiary); }
  .chat-av { width: 28px; height: 28px; border-radius: 50%; background: var(--acc); display: flex; align-items: center; justify-content: center; color: white; font-size: 11px; font-weight: 500; flex-shrink: 0; }
  .chat-hname { font-size: 13px; font-weight: 500; color: var(--acc-d); }
  .chat-hsub { font-size: 11px; color: var(--acc-d); opacity: 0.7; }
  .mode-wrap { margin-left: auto; display: flex; background: white; border-radius: 20px; padding: 2px; gap: 2px; border: 0.5px solid var(--color-border-tertiary); }
  .mode-btn { padding: 3px 10px; font-size: 11px; border-radius: 20px; cursor: pointer; border: none; background: none; color: var(--color-text-secondary); font-family: var(--font-sans); transition: all 0.15s; }
  .mode-btn.on { background: var(--acc); color: white; }
  .messages { padding: 12px; max-height: 400px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: var(--color-background-primary); scrollbar-width: thin; }
  .msg { display: flex; gap: 8px; }
  .msg.u { flex-direction: row-reverse; }
  .bubble { max-width: 83%; padding: 8px 12px; border-radius: var(--border-radius-lg); font-size: 13px; line-height: 1.6; }
  .msg.b .bubble { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); color: var(--color-text-primary); }
  .msg.u .bubble { background: var(--acc); color: white; }
  .av { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 500; flex-shrink: 0; margin-top: 2px; }
  .msg.b .av { background: var(--acc-l); color: var(--acc-d); }
  .msg.u .av { background: var(--pur-l); color: #3C3489; }
  .pill { display: inline-block; border-radius: 12px; padding: 2px 8px; font-size: 11px; font-weight: 500; margin: 2px; }
  .p-r { background: var(--danger-l); color: var(--danger); }
  .p-o { background: var(--warn-l); color: var(--warn); }
  .p-g { background: var(--acc-l); color: var(--acc-d); }
  .p-b { background: var(--info-l); color: #185FA5; }
  .chip { font-size: 11px; padding: 2px 8px; border-radius: 12px; background: var(--info-l); color: #185FA5; display: inline-block; margin: 2px; }
  .score-row { margin: 6px 0 2px; display: flex; flex-wrap: wrap; gap: 4px; }
  .typing { display: flex; gap: 3px; padding: 4px 0; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--acc); animation: bop 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bop { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }
  .sq-wrap { padding: 8px 12px; border-top: 0.5px solid var(--color-border-tertiary); background: var(--color-background-secondary); display: flex; gap: 6px; flex-wrap: wrap; }
  .sq { font-size: 11px; padding: 4px 10px; border-radius: 12px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); cursor: pointer; color: var(--color-text-secondary); font-family: var(--font-sans); transition: all 0.12s; }
  .sq:hover { background: var(--acc-l); border-color: var(--acc); color: var(--acc-d); }
  .inp-area { padding: 10px 12px; border-top: 0.5px solid var(--color-border-tertiary); background: var(--color-background-primary); display: flex; gap: 8px; align-items: flex-end; }
  .inp { flex: 1; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 7px 12px; font-size: 13px; font-family: var(--font-sans); color: var(--color-text-primary); background: var(--color-background-primary); resize: none; outline: none; }
  .inp:focus { border-color: var(--acc); }
  .send { width: 32px; height: 32px; border-radius: 50%; background: var(--acc); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .send:hover { background: var(--acc-d); }
  .send svg { width: 14px; height: 14px; fill: white; }
  strong { font-weight: 500; }
</style>

<div class="chatbot-area">
  <div class="chat-header">
    <div class="chat-av" id="av">AR</div>
    <div>
      <div class="chat-hname" id="hname">ARIA — Curriculum Intelligence Analyst</div>
      <div class="chat-hsub" id="hsub">Faculty mode · 10 companies · 2021–2025</div>
    </div>
    <div class="mode-wrap">
      <button class="mode-btn on" id="staffBtn" onclick="setMode('staff')">Faculty</button>
      <button class="mode-btn" id="stuBtn" onclick="setMode('student')">Student</button>
    </div>
  </div>

  <div class="messages" id="msgs"></div>

  <div class="sq-wrap" id="sqWrap"></div>

  <div class="inp-area">
    <textarea class="inp" id="inp" rows="1" placeholder="Ask about gaps, skills, priorities…" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();doSend();}"></textarea>
    <button class="send" onclick="doSend()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

function getReply(query, bank) {
  var q = query.toLowerCase().replace(/[?!.,]/g, '');
  for (var i = 0; i < bank.length; i++) {
    var ks = bank[i].keys;
    for (var j = 0; j < ks.length; j++) {
      if (q.indexOf(ks[j]) !== -1) {
        return bank[i].reply();
      }
    }
  }
  return null;
}

var STAFF_SQ = [
  'Top 5 gap skills by debt score',
  'What AI skills are missing from MSRIT?',
  'Which cloud skills are most urgent?',
  'Show watch list skills',
  'Compare all 5 institutes',
  'Which security skills are missing?',
  'What to add to semester 6 elective?',
  'Top skills by CLI'
];

var STUDENT_SQ = [
  'I want to become an ML engineer',
  'What should I learn before placement?',
  'What skills does Microsoft look for?',
  'Skills to learn alongside Kubernetes',
  'I want a cloud career',
  'I want to become a data engineer',
  'What are upcoming trending skills?',
  'I want to get into cybersecurity'
];

function renderSQ() {
  var w = document.getElementById('sqWrap');
  w.innerHTML = '';
  var list = mode === 'staff' ? STAFF_SQ : STUDENT_SQ;
  list.forEach(function(q) {
    var b = document.createElement('button');
    b.className = 'sq';
    b.textContent = q;
    b.onclick = function() { sendQ(q); };
    w.appendChild(b);
  });
}

function appendMsg(who, html) {
  var av2 = who === 'b' ? (mode === 'staff' ? 'AR' : 'SA') : 'ME';
  var wrap = document.getElementById('msgs');
  var d = document.createElement('div');
  d.className = 'msg ' + who;
  d.innerHTML = '<div class="av">' + av2 + '</div><div class="bubble">' + html + '</div>';
  wrap.appendChild(d);
  wrap.scrollTop = wrap.scrollHeight;
}

function showTyping() {
  var wrap = document.getElementById('msgs');
  var d = document.createElement('div');
  d.className = 'msg b'; d.id = 'tdot';
  var av2 = mode === 'staff' ? 'AR' : 'SA';
  d.innerHTML = '<div class="av">' + av2 + '</div><div class="bubble"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>';
  wrap.appendChild(d);
  wrap.scrollTop = wrap.scrollHeight;
}

function rmTyping() { var t = document.getElementById('tdot'); if(t) t.remove(); }

function doSend() {
  var el = document.getElementById('inp');
  var q = el.value.trim();
  if (!q) return;
  el.value = '';
  appendMsg('u', q);
  showTyping();
  var bank = mode === 'staff' ? STAFF : STUDENT;
  var reply = getReply(q, bank);
  var delay = 700 + Math.floor(Math.random() * 500);
  setTimeout(function() {
    rmTyping();
    if (reply) {
      appendMsg('b', reply);
    } else {
      appendMsg('b', '<strong>Query noted:</strong> "' + q.substring(0, 60) + (q.length > 60 ? '…' : '') + '"<br><br>In the live system this goes through spaCy query expansion → ChromaDB cosine retrieval with domain exclusivity filtering → hybrid re-ranking → Llama 3.3-70B generation grounded strictly in retrieved context.<br><br>Try one of the suggested questions below to see a full response.');
    }
  }, delay);
}

function sendQ(q) {
  document.getElementById('inp').value = q;
  doSend();
}

function setMode(m) {
  mode = m;
  document.getElementById('staffBtn').className = 'mode-btn' + (m === 'staff' ? ' on' : '');
  document.getElementById('stuBtn').className = 'mode-btn' + (m === 'student' ? ' on' : '');
  document.getElementById('av').textContent = m === 'staff' ? 'AR' : 'SA';
  document.getElementById('hname').textContent = m === 'staff' ? 'ARIA — Curriculum Intelligence Analyst' : 'SAGE — Skills & Growth Engine';
  document.getElementById('hsub').textContent = m === 'staff' ? 'Faculty mode · 10 companies · 2021–2025' : 'Student mode · Personalised career skill advice';
  document.getElementById('msgs').innerHTML = '';
  var greeting = m === 'staff'
    ? "Hi. I'm ARIA — your curriculum intelligence analyst. Ask me about gaps, CLI scores, debt rankings, or what to add to a specific course."
    : "Hey! I'm SAGE — your career skills advisor. Tell me what role you're targeting and I'll give you a ranked, honest learning roadmap based on real hiring data.";
  appendMsg('b', greeting);
  renderSQ();
}

setMode('staff');
</script>
